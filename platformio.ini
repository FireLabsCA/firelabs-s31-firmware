; FireLabs S31 firmware
; Sonoff S31 / ESP8266 (ESP-12 variant, 4MB Zbit flash)

[platformio]
name = firelabs-s31
default_envs = s31

[env:s31]
platform = espressif8266
board = esp12e
framework = arduino

; 4MB layout: ~1MB sketch + OTA copy, 1MB LittleFS for config + web assets.
board_build.ldscript = eagle.flash.4m1m.ld
board_build.filesystem = littlefs

; UART0 is wired to the CSE7766; no console on hardware. This speed only
; matters for host-side debug builds, never on the plug.
monitor_speed = 115200

lib_deps =
    esphome/ESPAsyncTCP-esphome @ ^2.0.0
    esphome/ESPAsyncWebServer-esphome @ ^3.2.0
    marvinroger/AsyncMqttClient @ ^0.9.0
    bblanchon/ArduinoJson @ ^7.2.0

; brand strings live in src/Branding.h (the AP prefix has a space)

; Diagnostic build: meter off, UART0 = 115200 debug console, boot-stage logging.
[env:s31_diag]
extends = env:s31
build_flags = -DFL_DIAG
